name: Backend Deploy to Render

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Render
        run: |
          # Trigger Render deployment via webhook
          curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}'
        env:
          RENDER_DEPLOY_WEBHOOK: ${{ secrets.RENDER_DEPLOY_WEBHOOK }}
      
      - name: Wait for deployment
        run: |
          echo "Deployment triggered. Check Render dashboard for status."
          echo "Render Dashboard: https://dashboard.render.com"
        
      # Optional: Send notification
      - name: Notify Slack (optional)
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Backend deployment triggered",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Backend Deployment*\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}"
                  }
                }
              ]
            }
       if: ${{ secrets.SLACK_WEBHOOK != '' }}
